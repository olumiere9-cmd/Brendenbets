<!DOCTYPE html>
<html>
<head>
<title>Brendenbets Racing Game</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b3d0b;
color:white;
text-align:center;
overflow:hidden;
cursor:crosshair;
}

header{
background:#111;
padding:15px;
font-size:36px;
font-weight:bold;
letter-spacing:2px;
box-shadow:0 4px 10px rgba(0,0,0,0.6);
}

#hud{
display:flex;
justify-content:center;
gap:60px;
font-size:22px;
margin:10px;
}

#racecourse{
width:1100px;
height:550px;
margin:auto;
position:relative;
background:#2e7d32;
border:8px solid #5d4037;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 30px rgba(0,0,0,0.7);
}

/* crowd */

.crowd{
position:absolute;
top:0;
width:100%;
height:70px;
background:repeating-linear-gradient(
90deg,
#444,
#444 8px,
#777 8px,
#777 16px
);
}

/* racetrack */

.track{
position:absolute;
width:880px;
height:380px;
border:18px solid #d7ccc8;
border-radius:50%;
top:90px;
left:110px;
background:transparent;
}

/* horse */

.horse{
position:absolute;
width:120px;
height:90px;
cursor:pointer;
}

/* horse body */

.horse-body{
width:80px;
height:40px;
background:#6d4c41;
border-radius:20px;
position:absolute;
bottom:0;
left:25px;
}

.horse-head{
width:25px;
height:25px;
background:#6d4c41;
border-radius:50%;
position:absolute;
top:10px;
left:0;
}

/* legs */

.leg{
width:6px;
height:22px;
background:#3e2723;
position:absolute;
bottom:-18px;
}

.l1{left:30px}
.l2{left:50px}
.l3{left:65px}
.l4{left:85px}

/* jockey */

.jockey{
position:absolute;
top:-35px;
left:45px;
}

.jockey-head{
width:20px;
height:20px;
background:#f1c27d;
border-radius:50%;
margin:auto;
}

.jockey-body{
width:30px;
height:25px;
background:#1db954;
position:relative;
margin:auto;
}

.jockey-body::after{
content:"";
width:12px;
height:12px;
background:yellow;
position:absolute;
top:6px;
left:9px;
transform:rotate(45deg);
}

/* button */

button{
margin-top:15px;
padding:12px 30px;
font-size:18px;
background:#ffd54f;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#ffca28;
}

</style>
</head>

<body>

<header>🏇 Brendenbets</header>

<div id="hud">
<div>Score: <span id="score">0</span></div>
<div>Time: <span id="time">30</span></div>
</div>

<div id="racecourse">
<div class="crowd"></div>
<div class="track"></div>
</div>

<button onclick="startGame()">Start Race</button>

<script>

let horses=[]
let angle=0
let score=0
let time=30
let running=false

const racecourse=document.getElementById("racecourse")

function createHorse(){

const horse=document.createElement("div")
horse.className="horse"

horse.innerHTML=`
<div class="horse-head"></div>
<div class="horse-body"></div>
<div class="leg l1"></div>
<div class="leg l2"></div>
<div class="leg l3"></div>
<div class="leg l4"></div>

<div class="jockey">
<div class="jockey-head"></div>
<div class="jockey-body"></div>
</div>
`

horse.onclick=()=>{
score++
document.getElementById("score").textContent=score
}

racecourse.appendChild(horse)
horses.push(horse)

}

function moveHorses(){

if(!running) return

angle+=0.02

const centerX=550
const centerY=300

const radiusX=420
const radiusY=180

horses.forEach((horse,i)=>{

const offset=i*1.5

const x=centerX + radiusX*Math.cos(angle+offset) - 60
const y=centerY + radiusY*Math.sin(angle+offset) - 40

horse.style.left=x+"px"
horse.style.top=y+"px"

})

requestAnimationFrame(moveHorses)

}

function startGame(){

score=0
time=30
running=true
angle=0
horses=[]

document.getElementById("score").textContent=0
document.getElementById("time").textContent=time

racecourse.innerHTML='<div class="crowd"></div><div class="track"></div>'

for(let i=0;i<3;i++){
createHorse()
}

moveHorses()

const timer=setInterval(()=>{

time--
document.getElementById("time").textContent=time

if(time<=0){
running=false
clearInterval(timer)
alert("Race finished! Your score: "+score)
}

},1000)

}

</script>

</body>
</html>
